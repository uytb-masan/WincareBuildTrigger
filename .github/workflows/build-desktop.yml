name: Build Desktop Apps

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows
        run: flutter build windows --release
        
      # Compress the built output into a ZIP file for easy downloading
      - name: Zip build folder
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath WincareBuildTrigger-Windows.zip
        
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WincareBuildTrigger-Windows
          path: WincareBuildTrigger-Windows.zip


