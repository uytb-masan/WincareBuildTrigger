name: Build Desktop Apps

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows
        run: flutter build windows --release
        
      # Compress the built output into a ZIP file for easy downloading
      - name: Zip build folder
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath WincareBuildTrigger-Windows.zip
        
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WincareBuildTrigger-Windows
          path: WincareBuildTrigger-Windows.zip

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP_NAME="WincareBuildTrigger"
          APP_PATH="build/macos/Build/Products/Release/${APP_NAME}.app"
          DMG_PATH="${APP_NAME}-macOS.dmg"

          create-dmg \
            --volname "${APP_NAME}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${APP_NAME}.app" 175 190 \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link 425 190 \
            "${DMG_PATH}" \
            "${APP_PATH}"

      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WincareBuildTrigger-macOS
          path: WincareBuildTrigger-macOS.dmg
